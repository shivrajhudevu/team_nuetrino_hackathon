<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIKOS | AI Fraud Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020813;
            --cyan-glow: #00e5ff;
            --cyan-dark: #005a66;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --glass-bg: rgba(10, 20, 35, 0.6);
            --glass-border: rgba(0, 229, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Canvas Background */
        #plexus-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #031525 0%, #01060d 100%);
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            background: rgba(2, 8, 19, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--cyan-glow);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cyan-glow);
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.3);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .hamburger {
            font-size: 1.8rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        /* Hero Section */
        header {
            padding: 120px 5% 60px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .pill-badge {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: var(--cyan-glow);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }

        h1.hero-title {
            font-size: 5rem;
            font-weight: 800;
            color: var(--cyan-glow);
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(0, 229, 255, 0.6);
            text-transform: uppercase;
        }

        h2.hero-subtitle {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 20px;
            max-width: 600px;
            line-height: 1.4;
        }

        p.hero-tagline {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--cyan-glow);
            margin-bottom: 60px;
            letter-spacing: 1px;
        }

        .shield-button-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 60px;
        }

        .shield-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px dashed rgba(0, 229, 255, 0.3);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        .shield-button {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(0, 90, 102, 0.8));
            border: 1px solid var(--cyan-glow);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cyan-glow);
            font-size: 2.5rem;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .shield-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.6);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Stats Glass Panel */
        .stats-container {
            max-width: 800px;
            margin: 0 auto 100px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 229, 255, 0.05);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            text-align: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--cyan-glow);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .stat-title {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* How it works section start */
        .section-title {
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
        }
        .section-title span { color: var(--cyan-glow); }

        @media (max-width: 768px) {
            h1.hero-title { font-size: 3rem; }
            h2.hero-subtitle { font-size: 1.4rem; }
            .stats-grid { grid-template-columns: 1fr; gap: 40px; }
        }
    </style>
</head>
<body>
    <!-- Plexus Network Background -->
    <canvas id="plexus-canvas"></canvas>

    <nav>
        <div class="logo-container">
            <div class="logo-icon">🛡️</div>
            <div class="logo-text">EIKOS</div>
        </div>
        <div class="hamburger">≡</div>
    </nav>

    <header>
        <div class="pill-badge">⚡ AI-Powered Defense for Digital India</div>
        <h1 class="hero-title">EIKOS</h1>
        <h2 class="hero-subtitle">AI Powered Multilingual Fraud Intelligence Engine</h2>
        <p class="hero-tagline">"Understand Before You Trust."</p>

        <div class="shield-button-container">
            <div class="shield-ring"></div>
            <div class="shield-button">🛡️</div>
        </div>
    </header>

    <section class="stats-container">
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-icon">🧠</div>
                <div class="stat-value">2,847,503+</div>
                <div class="stat-title">Fraud Patterns<br>Trained</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">🌐</div>
                <div class="stat-value">22</div>
                <div class="stat-title">Languages<br>Understood</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">⏱️</div>
                <div class="stat-value">1.2s</div>
                <div class="stat-title">Avg Scan Time</div>
            </div>
            <div class="stat-item">
                <div class="stat-icon">🎯</div>
                <div class="stat-value">99.7%</div>
                <div class="stat-title">Accuracy<br>Confidence</div>
            </div>
        </div>
    </section>

    <section style="text-align: center; padding-bottom: 50px;">
        <h2 class="section-title">How <span>EIKOS</span> Works</h2>
    </section>

    <!-- Scanner Section (Restored from previous functionality) -->
    <section class="stats-container" style="margin-top: 0; padding: 40px;">
        <h3 style="color: var(--cyan-glow); font-size: 1.5rem; margin-bottom: 20px; text-align: center;">Test The Engine Live</h3>
        <textarea id="scanInput" placeholder="Paste a suspicious SMS, Email, or WhatsApp message here..." 
            style="width: 100%; height: 120px; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: white; padding: 15px; border-radius: 12px; font-size: 1rem; margin-bottom: 20px; resize: none;"></textarea>
        
        <button onclick="scanText()" style="width: 100%; background: linear-gradient(135deg, rgba(0, 229, 255, 0.2), rgba(0, 90, 102, 0.8)); border: 1px solid var(--cyan-glow); color: var(--text-main); font-size: 1.2rem; font-weight: bold; padding: 15px; border-radius: 12px; cursor: pointer; transition: 0.3s;">
            SCAN MESSAGE
        </button>

        <div id="scanResult" style="display: none; margin-top: 30px; padding: 20px; border-radius: 12px; background: rgba(255,42,95,0.1); border: 1px solid var(--neon-crimson); text-align: left;">
            <div id="resTitle" style="font-size: 1.4rem; font-weight: bold; color: var(--neon-crimson); margin-bottom: 10px;"></div>
            <div id="resReasons" style="color: var(--text-main); font-family: monospace; font-size: 0.9rem; line-height: 1.6;"></div>
        </div>
    </section>

    <script>
        // Scanner Logic
        function scanText() {
            const text = document.getElementById("scanInput").value;
            const resDiv = document.getElementById("scanResult");
            const resTitle = document.getElementById("resTitle");
            const resReasons = document.getElementById("resReasons");

            if (!text.trim()) {
                alert("Please enter some text to scan.");
                return;
            }

            resDiv.style.display = "block";
            resTitle.style.color = "var(--text-muted)";
            resTitle.innerText = "Analyzing neural patterns...";
            resReasons.innerHTML = "";

            let lang = "EN";
            if (/[\u0C80-\u0CFF]/.test(text)) lang = "KN";
            else if (/[\u0900-\u097F]/.test(text)) lang = "HI";

            setTimeout(() => {
                let verdict = "✅ SAFE - NO THREATS DETECTED";
                let verdictColor = "var(--neon-blue)";
                let bgStyle = "rgba(0, 229, 255, 0.1)";
                let borderStyle = "1px solid var(--cyan-glow)";
                
                let reasonsHtml = "> Analysis Complete<br>> No heuristic matches found.";

                // Simplified trigger detection for demo
                const isThreat = text.toLowerCase().includes("kyc") || text.toLowerCase().includes("bank") || 
                               text.toLowerCase().includes("block") || text.includes("ಗ್ರಾಹಕರೆ") || text.includes("ಖಾತೆ");

                if (isThreat) {
                    let translatedVerdict = "⚠️ SUSPICIOUS - PROCEED WITH CAUTION";
                    if (lang === "KN") translatedVerdict = "⚠️ ಅನುಮಾನಾಸ್ಪದ - ಎಚ್ಚರಿಕೆಯಿಂದ ಮುಂದುವರಿಯಿರಿ";
                    if (lang === "HI") translatedVerdict = "⚠️ संदिग्ध - सावधानी से आगे बढ़ें";
                    
                    verdict = translatedVerdict;
                    verdictColor = "var(--neon-crimson)";
                    bgStyle = "rgba(255, 42, 95, 0.1)";
                    borderStyle = "1px solid var(--neon-crimson)";
                    
                    reasonsHtml = "Confidence: 85%<br><br>> Subject Detected: KYC / BANKING<br>> Intent Match: INTIMIDATION / THREAT";
                }

                resDiv.style.background = bgStyle;
                resDiv.style.border = borderStyle;
                resTitle.style.color = verdictColor;
                resTitle.innerText = verdict;
                resReasons.innerHTML = reasonsHtml;
            }, 800);
        }

        // Cyan Plexus Network Background
        const canvas = document.getElementById('plexus-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#00e5ff';
                ctx.fill();
            }
        }

        // Create particles
        const particleCount = Math.min(100, window.innerWidth / 10);
        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                
                // Draw connecting lines (plexus effect)
                for (let j = i; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = '#00e5ff';
                        ctx.globalAlpha = 1 - (dist / 150);
                        ctx.lineWidth = 0.8;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.globalAlpha = 1;
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
